        function isPointInPolygon(point, polygon) {
            const x = point[0], y = point[1];
            let inside = false;
            let list_of_rings = polygon;
            if (!Array.isArray(list_of_rings[0][0])) {
                list_of_rings = [polygon];
            }

            for (let ring of list_of_rings) {
                for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                    const xi = ring[i][0], yi = ring[i][1];
                    const xj = ring[j][0], yj = ring[j][1];
                    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
            }
            return inside;
        }

        const regionPolygons = {};
        L.geoJSON(geojson, {
            style: function(f) {
                return { color: 'blue', fillOpacity: 0.1, weight: 1 };
            },
            onEachFeature: function(f, layer) {
                regionPolygons[f.properties.id] = f.geometry.coordinates;
                layer.bindPopup('Region: ' + f.properties.id);
            }
        }).addTo(map);

        cities.forEach(city => {
            const poly = regionPolygons[city.region_id];
            let inside = false;
            if (poly) {
                inside = isPointInPolygon([city.lng, city.lat], poly);
            }
            
            const color = inside ? '#2ecc71' : '#e74c3c';
            const labelStyle = inside ? 'city-label-green' : 'city-label-red';
            
            L.circleMarker([city.lat, city.lng], {
                radius: 4,
                color: 'white',
                fillColor: color,
                weight: 1,
                fillOpacity: 1
            }).addTo(map).bindPopup('City: ' + city.name + '<br>Region: ' + city.region_id + '<br>Inside: ' + inside);

            L.marker([city.lat, city.lng], {
              icon: L.divIcon({
                className: labelStyle,
                html: city.name,
                iconSize: [100, 16],
                iconAnchor: [50, -8]
              })
            }).addTo(map);
        });
